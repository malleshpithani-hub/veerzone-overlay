<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Veerzone StreamChamp Full Bottom Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --violet: #a855f7;
      --violet2: #7c3aed;
      --cyan: #22d3ee;
      --blue: #2563eb;
      --bg1: rgba(9, 14, 28, 0.98);
      --bg2: rgba(4, 7, 15, 0.99);
      --white: #f8fbff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
    }

    body {
      font-family: "Rajdhani", Arial, sans-serif;
      color: var(--white);
      pointer-events: none;
    }

    .stage {
      position: fixed;
      inset: 0;
      background: transparent;
      overflow: hidden;
    }

    .overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 250px;
      display: grid;
      grid-template-columns: 1.12fr 1.18fr 1.12fr;
      align-items: end;
      gap: 0;
      z-index: 4;
    }

    .beam {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 183px;
      height: 2px;
      background: linear-gradient(90deg,
        rgba(168,85,247,0.95) 0%,
        rgba(124,58,237,0.82) 38%,
        rgba(34,211,238,0.82) 62%,
        rgba(34,211,238,0.95) 100%);
      box-shadow: 0 0 10px rgba(168,85,247,0.35), 0 0 12px rgba(34,211,238,0.28);
      z-index: 2;
    }

    .panel {
      position: relative;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      border-top: 2px solid rgba(255,255,255,0.05);
      border-bottom: 2px solid rgba(255,255,255,0.04);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03), 0 -10px 30px rgba(0,0,0,0.22);
      overflow: visible;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 10px 18px;
      opacity: 0.12;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .left {
      border-left: 3px solid rgba(168,85,247,0.95);
      border-top: 2px solid rgba(168,85,247,0.85);
      clip-path: polygon(0 18px, calc(100% - 28px) 18px, calc(100% - 14px) 0, 100% 0, 100% 100%, 0 100%);
      padding: 14px 16px 12px 20px;
    }

    .center {
      height: 126px;
      z-index: 5;
      border-top: 2px solid rgba(168,85,247,0.84);
      border-left: 2px solid rgba(168,85,247,0.62);
      border-right: 2px solid rgba(34,211,238,0.62);
      border-bottom: 2px solid rgba(34,211,238,0.35);
      clip-path: polygon(0 18px, 30px 18px, 44px 0, calc(100% - 44px) 0, calc(100% - 30px) 18px, 100% 18px, 100% 100%, 0 100%);
      padding: 50px 16px 10px;
      margin-top: -16px;
    }

    .right {
      border-right: 3px solid rgba(34,211,238,0.95);
      border-top: 2px solid rgba(34,211,238,0.84);
      clip-path: polygon(14px 0, 100% 0, 100% 100%, 0 100%, 0 0);
      padding: 14px 20px 12px 16px;
    }

    .edge-left, .edge-right {
      position: absolute;
      bottom: 0;
      height: 110px;
      width: 42px;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      z-index: 3;
    }

    .edge-left {
      left: 0;
      border-top: 2px solid rgba(168,85,247,0.85);
      border-left: 3px solid rgba(168,85,247,0.95);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .edge-right {
      right: 0;
      border-top: 2px solid rgba(34,211,238,0.85);
      border-right: 3px solid rgba(34,211,238,0.95);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .logo-holder {
      position: absolute;
      left: 50%;
      bottom: 106px;
      transform: translateX(-50%);
      width: 134px;
      height: 134px;
      z-index: 7;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 0 18px rgba(168,85,247,0.44)) drop-shadow(0 0 12px rgba(34,211,238,0.28));
    }

    .logo-holder::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -10px;
      transform: translateX(-50%);
      width: 70px;
      height: 16px;
      background: linear-gradient(90deg, rgba(168,85,247,0.9), rgba(34,211,238,0.9));
      filter: blur(10px);
      opacity: 0.45;
    }

    .logo-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .socials {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: center;
      text-align: center;
      gap: 0;
    }

    .social {
      padding: 0 8px;
      border-right: 1px solid rgba(168,85,247,0.55);
    }

    .social:last-child { border-right: 0; }

    .social svg {
      width: 28px;
      height: 28px;
      display: block;
      margin: 0 auto 6px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 6px currentColor);
    }

    .instagram { color: #b45cff; }
    .youtube { color: #a855f7; }
    .whatsapp { color: #21d4f5; }

    .social-label {
      font-size: 12px;
      line-height: 1;
      margin-bottom: 4px;
      color: #fff;
      font-weight: 500;
    }

    .social-value {
      font-size: 11px;
      line-height: 1.1;
      color: #f7f8ff;
      font-weight: 700;
      white-space: nowrap;
    }

    .brand-stack, .match-stack {
      position: relative;
      z-index: 6;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .brand-name {
      font-family: "Orbitron", Arial, sans-serif;
      font-weight: 900;
      font-style: italic;
      font-size: 32px;
      line-height: 1;
      letter-spacing: -0.02em;
      white-space: nowrap;
      background: linear-gradient(105deg, #b45cff 0%, #7c3aed 34%, #4d7cff 60%, #22d3ee 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .register-line {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: "Orbitron", Arial, sans-serif;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.14em;
      color: #63dbff;
      white-space: nowrap;
      text-transform: uppercase;
    }

    .register-line::before, .register-line::after {
      content: "";
      width: 28px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--violet));
      box-shadow: 0 0 8px rgba(168,85,247,0.45);
    }

    .register-line::after {
      background: linear-gradient(90deg, var(--cyan), transparent);
      box-shadow: 0 0 8px rgba(34,211,238,0.45);
    }

    .live-title {
      font-family: "Orbitron", Arial, sans-serif;
      font-weight: 900;
      font-style: italic;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -0.02em;
      white-space: nowrap;
      background: linear-gradient(100deg, #4e7dff, #22d3ee 76%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .match-subtitle {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #35d8f5;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .match-subtitle::before, .match-subtitle::after {
      content: "";
      width: 28px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan));
      box-shadow: 0 0 8px rgba(34,211,238,0.45);
    }

    .match-subtitle::after {
      background: linear-gradient(90deg, var(--cyan), transparent);
    }

    .match-description {
      margin-top: 7px;
      color: rgba(255,255,255,0.90);
      font-size: 10px;
      line-height: 1;
      white-space: nowrap;
      font-weight: 500;
    }

    @media (min-width: 1600px) {
      .overlay { height: 290px; }
      .beam { bottom: 208px; }
      .panel { height: 128px; }
      .center { height: 144px; padding-top: 58px; }
      .edge-left, .edge-right { height: 128px; width: 52px; }
      .logo-holder { width: 152px; height: 152px; bottom: 122px; }
      .social svg { width: 34px; height: 34px; margin-bottom: 8px; }
      .social-label { font-size: 14px; }
      .social-value { font-size: 13px; }
      .brand-name { font-size: 42px; }
      .register-line { font-size: 12px; }
      .live-title { font-size: 36px; }
      .match-subtitle { font-size: 15px; }
      .match-description { font-size: 12px; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="beam"></div>
    <div class="edge-left"></div>
    <div class="edge-right"></div>

    <div class="logo-holder" aria-hidden="true">
      <svg class="logo-svg" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="vzOuter" x1="48" y1="35" x2="278" y2="284" gradientUnits="userSpaceOnUse">
            <stop stop-color="#b44cff" />
            <stop offset="0.48" stop-color="#6d5cff" />
            <stop offset="1" stop-color="#22d3ee" />
          </linearGradient>
          <linearGradient id="vzFill" x1="74" y1="68" x2="245" y2="258" gradientUnits="userSpaceOnUse">
            <stop stop-color="#f050ff" />
            <stop offset="0.45" stop-color="#7c3aed" />
            <stop offset="1" stop-color="#22d3ee" />
          </linearGradient>
          <filter id="vzGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <path d="M160 19L281 88V226L160 301L39 226V88L160 19Z" fill="#070b18" stroke="url(#vzOuter)" stroke-width="10" filter="url(#vzGlow)" />
        <path d="M82 99H118L160 188L202 99H238L160 267L82 99Z" fill="url(#vzFill)" stroke="#9bdfff" stroke-opacity=".18" stroke-width="3" />
        <path d="M160 55L177 83L160 112L143 83L160 55Z" fill="#22d3ee" stroke="#b9f5ff" stroke-width="3" />
      </svg>
    </div>

    <section class="overlay" aria-label="Veerzone full width bottom overlay">
      <article class="panel left">
        <div class="socials">
          <div class="social instagram">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="3" width="18" height="18" rx="5"></rect>
              <circle cx="12" cy="12" r="4"></circle>
              <circle cx="17.4" cy="6.6" r="1" fill="currentColor" stroke="none"></circle>
            </svg>
            <div class="social-label">Instagram</div>
            <div class="social-value">@veerzone_battles</div>
          </div>
          <div class="social youtube">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="2.5" y="5.5" width="19" height="13" rx="4"></rect>
              <path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"></path>
            </svg>
            <div class="social-label">YouTube</div>
            <div class="social-value">@veerzone_official</div>
          </div>
          <div class="social whatsapp">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20.5 11.6a8.5 8.5 0 0 1-12.6 7.5L3 20.5l1.4-4.7A8.5 8.5 0 1 1 20.5 11.6z"></path>
              <path d="M8.6 7.9c.3-.6.7-.6 1-.6h.4c.2 0 .5.1.6.5l.8 2c.1.3.1.6-.1.8l-.8 1c-.2.2-.1.5.1.8.5.9 1.3 1.7 2.3 2.2.3.2.6.2.8 0l1-.9c.2-.2.5-.2.8-.1l2 .9c.3.2.5.4.5.7 0 .4-.2 1.4-.8 2-.6.7-1.5 1-2.5.8-1.3-.2-2.9-.8-4.8-2.5-1.5-1.4-2.7-3-3.1-4.3-.5-1.5.1-2.6.8-3.3z"></path>
            </svg>
            <div class="social-label">WhatsApp</div>
            <div class="social-value">9014122762</div>
          </div>
        </div>
      </article>

      <article class="panel center">
        <div class="brand-stack">
          <div class="brand-name">VEERZONE</div>
          <div class="register-line">REGISTER IN VEERZONE.COM</div>
        </div>
      </article>

      <article class="panel right">
        <div class="match-stack">
          <div class="live-title">LIVE MATCHES</div>
          <div class="match-subtitle">Classic's and TDM's</div>
          <div class="match-description">Daily TDM's and Weekly Classics</div>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
