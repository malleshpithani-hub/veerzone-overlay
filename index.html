<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Veerzone Premium Stream Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Oxanium:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
:root{--violet:#9b5cff;--violet2:#6f35ea;--cyan:#18d8ff;--blue:#2f73ff;--white:#f8fbff;--muted:#aab7cc;--deep:#030611;--panel:#07101f;--line:rgba(255,255,255,.10)}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:transparent!important}body{font-family:"Inter",Arial,sans-serif;color:var(--white);pointer-events:none}.stage{position:fixed;inset:0;overflow:hidden;background:transparent;isolation:isolate}
.ambient{position:absolute;left:0;right:0;bottom:-18px;height:230px;z-index:0;background:radial-gradient(ellipse at 18% 100%,rgba(124,58,237,.23),transparent 45%),radial-gradient(ellipse at 82% 100%,rgba(24,216,255,.18),transparent 45%);filter:blur(18px);opacity:.85}
.overlay{position:absolute;left:0;right:0;bottom:0;height:188px;z-index:3;display:flex;align-items:flex-end}
.base{position:absolute;left:0;right:0;bottom:0;height:116px;background:linear-gradient(90deg,rgba(155,92,255,.07),transparent 25%,transparent 75%,rgba(24,216,255,.07)),linear-gradient(180deg,rgba(10,17,33,.985),rgba(3,7,16,.995));border-top:1px solid rgba(255,255,255,.07);box-shadow:0 -14px 42px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.025)}
.base::before{content:"";position:absolute;left:0;right:0;top:-2px;height:2px;background:linear-gradient(90deg,var(--violet),rgba(155,92,255,.4) 38%,rgba(24,216,255,.42) 62%,var(--cyan));box-shadow:0 0 9px rgba(155,92,255,.44),0 0 12px rgba(24,216,255,.34)}
.base::after{content:"";position:absolute;inset:10px 0 0;opacity:.09;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:42px 42px;mask-image:linear-gradient(90deg,#000,transparent 34%,transparent 66%,#000)}
.rail{position:relative;z-index:3;width:100%;height:116px;display:grid;grid-template-columns:minmax(0,1fr) minmax(480px,650px) minmax(0,1fr);align-items:stretch;gap:0}
.zone{position:relative;min-width:0;display:flex;align-items:center}.left-zone{justify-content:flex-start;padding:12px 54px 12px 38px}.right-zone{justify-content:flex-end;padding:12px 38px 12px 54px}
.left-zone::after,.right-zone::before{content:"";position:absolute;top:22px;bottom:18px;width:1px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.16),transparent)}.left-zone::after{right:22px}.right-zone::before{left:22px}
.socials{display:flex;align-items:center;gap:16px;min-width:0}.social{min-width:0;display:grid;grid-template-columns:34px auto;grid-template-rows:auto auto;column-gap:10px;align-items:center;padding:10px 14px 9px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018));border:1px solid rgba(255,255,255,.075);box-shadow:inset 0 1px 0 rgba(255,255,255,.035),0 8px 26px rgba(0,0,0,.16);animation:cardBreath 5.5s ease-in-out infinite}.social:nth-child(2){animation-delay:.35s}.social:nth-child(3){animation-delay:.7s}
.icon-wrap{grid-row:1/3;width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08)}.social svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}.instagram{color:#b46cff}.youtube{color:#9b5cff}.whatsapp{color:#20dcff}.social-label{font-size:10px;font-weight:600;line-height:1;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}.social-value{margin-top:5px;font-family:"Oxanium",sans-serif;font-size:12px;font-weight:700;line-height:1;color:#fff;white-space:nowrap}
.center-zone{position:relative;z-index:6;height:146px;align-self:end;display:flex;align-items:flex-end;justify-content:center;padding:0 26px 15px;background:linear-gradient(180deg,rgba(12,20,40,.995),rgba(4,8,18,.995));border-left:1px solid rgba(155,92,255,.34);border-right:1px solid rgba(24,216,255,.34);border-top:1px solid rgba(255,255,255,.10);clip-path:polygon(0 26px,34px 26px,50px 0,calc(100% - 50px) 0,calc(100% - 34px) 26px,100% 26px,100% 100%,0 100%);box-shadow:0 -14px 42px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.035)}
.center-zone::before{content:"";position:absolute;left:28px;right:28px;top:24px;height:1px;background:linear-gradient(90deg,transparent,var(--violet),var(--cyan),transparent);opacity:.75}.center-zone::after{content:"";position:absolute;left:26px;right:26px;bottom:5px;height:2px;background:linear-gradient(90deg,transparent,var(--violet),var(--cyan),transparent);opacity:.52;box-shadow:0 0 12px rgba(24,216,255,.25)}
.crest-dock{position:absolute;left:50%;top:-62px;transform:translateX(-50%);z-index:9;width:126px;height:126px;display:grid;place-items:center;filter:drop-shadow(0 0 18px rgba(155,92,255,.40)) drop-shadow(0 0 12px rgba(24,216,255,.24));animation:crestFloat 4.8s ease-in-out infinite}.crest-dock::before{content:"";position:absolute;left:11px;right:11px;bottom:-7px;height:26px;background:linear-gradient(90deg,rgba(155,92,255,.7),rgba(24,216,255,.7));clip-path:polygon(15% 0,85% 0,100% 100%,0 100%);filter:blur(11px);opacity:.35}.crest-dock svg{width:100%;height:100%;display:block}
.brand{position:relative;z-index:7;text-align:center;width:100%}.brand-name{font-family:"Oxanium",sans-serif;font-size:42px;font-weight:800;line-height:.92;letter-spacing:-.045em;background:linear-gradient(105deg,#b66cff 0%,#8b5cf6 34%,#5e82ff 62%,#24dcff 100%);-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap;text-shadow:0 0 22px rgba(124,58,237,.12)}.brand-sub{margin-top:9px;display:flex;align-items:center;justify-content:center;gap:12px;font-family:"Oxanium",sans-serif;font-size:10px;font-weight:700;letter-spacing:.18em;color:#73dfff;text-transform:uppercase}.brand-sub::before,.brand-sub::after{content:"";width:30px;height:1px;background:linear-gradient(90deg,transparent,var(--violet))}.brand-sub::after{background:linear-gradient(90deg,var(--cyan),transparent)}
.live-card{position:relative;min-width:390px;display:grid;grid-template-columns:10px auto;column-gap:15px;align-items:center;padding:13px 18px;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018));border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.035),0 8px 28px rgba(0,0,0,.16);overflow:hidden}.live-card::after{content:"";position:absolute;top:-50%;bottom:-50%;width:70px;left:-90px;transform:skewX(-24deg);background:linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent);animation:sweep 6.5s ease-in-out infinite}.live-dot{width:9px;height:9px;border-radius:50%;background:#28e8ff;box-shadow:0 0 9px rgba(40,232,255,.95),0 0 20px rgba(40,232,255,.40);animation:pulse 1.8s ease-in-out infinite}.live-copy{min-width:0}.live-title{font-family:"Oxanium",sans-serif;font-size:25px;font-weight:800;line-height:1;letter-spacing:-.025em;color:#fff;white-space:nowrap}.live-title span{background:linear-gradient(90deg,#6b8cff,#24dcff);-webkit-background-clip:text;background-clip:text;color:transparent}.live-meta{margin-top:7px;display:flex;align-items:center;gap:9px;color:#77def5;font-size:12px;font-weight:700;white-space:nowrap}.live-meta i{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.32)}.live-desc{margin-top:5px;color:var(--muted);font-size:10px;font-weight:500;white-space:nowrap}
.edge-cut{position:absolute;bottom:96px;width:110px;height:5px;z-index:5;transform:skewX(-30deg);opacity:.8}.edge-cut.left{left:0;background:linear-gradient(90deg,var(--violet),transparent)}.edge-cut.right{right:0;background:linear-gradient(90deg,transparent,var(--cyan))}
@keyframes pulse{0%,100%{transform:scale(.82);opacity:.68}50%{transform:scale(1.14);opacity:1}}@keyframes crestFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-3px)}}@keyframes cardBreath{0%,100%{border-color:rgba(255,255,255,.075)}50%{border-color:rgba(255,255,255,.12)}}@keyframes sweep{0%,18%{left:-90px;opacity:0}28%{opacity:.8}52%{left:115%;opacity:0}100%{left:115%;opacity:0}}
@media(max-width:1250px){.rail{grid-template-columns:minmax(0,1fr) minmax(400px,520px) minmax(0,1fr)}.left-zone{padding-left:20px;padding-right:30px}.right-zone{padding-right:20px;padding-left:30px}.socials{gap:8px}.social{grid-template-columns:28px auto;padding:8px 9px}.icon-wrap{width:28px;height:28px}.social svg{width:17px;height:17px}.social-label{font-size:8px}.social-value{font-size:9px}.live-card{min-width:310px}.live-title{font-size:20px}.live-meta{font-size:10px}.live-desc{font-size:8px}.brand-name{font-size:34px}.crest-dock{width:112px;height:112px;top:-50px}}
@media(max-width:850px){.overlay{height:150px}.base{height:88px}.rail{height:88px;grid-template-columns:1fr 1.15fr 1fr}.center-zone{height:112px;padding:0 8px 10px;clip-path:polygon(0 18px,22px 18px,34px 0,calc(100% - 34px) 0,calc(100% - 22px) 18px,100% 18px,100% 100%,0 100%)}.crest-dock{width:88px;height:88px;top:-38px}.brand-name{font-size:24px}.brand-sub{font-size:6px;gap:5px;margin-top:6px}.brand-sub::before,.brand-sub::after{width:12px}.left-zone,.right-zone{padding:6px}.socials{gap:3px}.social{display:flex;justify-content:center;padding:7px}.social-label,.social-value{display:none}.icon-wrap{width:28px;height:28px}.live-card{min-width:0;width:100%;padding:9px 10px;column-gap:8px}.live-title{font-size:14px}.live-meta{font-size:7px;gap:4px}.live-desc{display:none}.left-zone::after,.right-zone::before{display:none}}
</style>
</head>
<body>
<main class="stage" aria-label="Veerzone premium stream overlay">
<div class="ambient"></div><div class="edge-cut left"></div><div class="edge-cut right"></div>
<section class="overlay"><div class="base"></div><div class="rail">
<div class="zone left-zone"><div class="socials">
<div class="social instagram"><div class="icon-wrap"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.3" cy="6.7" r="1" fill="currentColor" stroke="none"/></svg></div><div class="social-label">Instagram</div><div class="social-value">@veerzone_battles</div></div>

</div></div>
<div class="center-zone"><div class="crest-dock" aria-hidden="true"><svg viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="outer" x1="48" y1="34" x2="280" y2="286" gradientUnits="userSpaceOnUse"><stop stop-color="#b56cff"/><stop offset=".48" stop-color="#6c5dff"/><stop offset="1" stop-color="#22ddff"/></linearGradient><linearGradient id="fill" x1="80" y1="70" x2="245" y2="260" gradientUnits="userSpaceOnUse"><stop stop-color="#ed4cff"/><stop offset=".46" stop-color="#713de9"/><stop offset="1" stop-color="#20d8ff"/></linearGradient><filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><path d="M160 20L281 89V225L160 300L39 225V89L160 20Z" fill="#07101f" stroke="url(#outer)" stroke-width="10" filter="url(#glow)"/><path d="M83 99H119L160 188L201 99H237L160 267L83 99Z" fill="url(#fill)" stroke="#d8f8ff" stroke-opacity=".17" stroke-width="3"/><path d="M160 55L177 83L160 112L143 83L160 55Z" fill="#20d8ff" stroke="#c9f8ff" stroke-width="3"/><path d="M112 112L160 210L208 112" stroke="rgba(255,255,255,.34)" stroke-width="3"/></svg></div><div class="brand"><div class="brand-name">VEERZONE</div><div class="brand-sub">Register in veerzone.com</div></div></div>
<div class="zone right-zone"><div class="live-card"><div class="live-dot"></div><div class="live-copy"><div class="live-title"><span>LIVE</span> MATCHES</div><div class="live-meta">Classic's &amp; TDM's <i></i> BGMI</div><div class="live-desc">Daily TDM's and Weekly Classics</div></div></div></div>
</div></section>
</main>
</body>
</html>
