<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Veerzone Bottom Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="overlay-stage" aria-label="Veerzone stream bottom overlay">
    <section class="premium-bottom-bar">
      <div class="badge-wrap" aria-hidden="true">
        <div class="side-hex"></div>
        <div class="v-badge">
          <span class="v-mark">V</span>
          <span class="gem"></span>
        </div>
      </div>

      <div class="bar-body">
        <span class="shine-pass" aria-hidden="true"></span>
        <div class="neon-track top-track"></div>
        <div class="neon-track bottom-track"></div>

        <div class="left-group">
          <span class="brand-chip">VEERZONE</span>
          <span class="live-dot"></span>
          <span class="mode-text" id="modeText">MATCH LIVE</span>
        </div>

        <div class="divider-line"></div>

        <div class="right-group">
          <span class="micro-label">OFFICIAL WEBSITE</span>
          <span class="site-text" id="siteText">VEERZONE.COM</span>
        </div>

        <div class="right-caps" aria-hidden="true"><span></span><span></span><span></span></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
