<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Veerzone Floating V-Node</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="overlay-stage" aria-label="Veerzone Floating V-Node lower-third overlay">
    <section class="vnode-lowerthird">
      <div class="vnode-logo-wrap" aria-hidden="true">
        <div class="vnode-orbit orbit-one"></div>
        <div class="vnode-orbit orbit-two"></div>
        <div class="vnode-logo">
          <span class="vnode-gem"></span>
          <span class="vnode-v">V</span>
          <span class="vnode-shine"></span>
        </div>
      </div>

      <div class="vnode-mainbar">
        <span class="energy-line top-energy"></span>
        <span class="energy-line bottom-energy"></span>

        <div class="left-segment">
          <span class="brand-pill">VEERZONE</span>
          <div class="mode-chip">
            <span class="live-dot"></span>
            <span class="mode-text" id="modeText">MATCH LIVE</span>
          </div>
        </div>

        <div class="center-cut"></div>

        <div class="right-segment">
          <span class="site-label">OFFICIAL PLATFORM</span>
          <span class="site-text" id="siteText">VEERZONE.COM</span>
        </div>

        <div class="right-slashes" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
