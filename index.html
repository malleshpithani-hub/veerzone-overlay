<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Veerzone Stream Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="overlay-shell">
    <section class="top-left hud-card brand-card">
      <div class="brand-row">
        <div class="v-badge">V</div>
        <div>
          <div class="brand-name">VEERZONE</div>
          <div class="brand-tagline">BGMI COMPETITIVE ARENA</div>
        </div>
      </div>
      <div class="status-pill"><span class="live-dot"></span><span id="statusText">REGISTRATION LIVE</span></div>
    </section>

    <section class="top-right hud-card match-card">
      <div class="eyebrow">TONIGHT BATTLE</div>
      <h1 id="matchTitle">BO2 SCRIMS</h1>
      <div class="match-grid">
        <div><span>START</span><strong id="startTime">10:30 PM</strong></div>
        <div><span>SLOTS</span><strong id="slotsLeft">3 LEFT</strong></div>
      </div>
    </section>

    <section class="center-panel hud-card">
      <div class="hex-orbit"><span></span><span></span><span></span></div>
      <div class="center-copy">
        <div class="small-chip">FREE ENTRY ONLY</div>
        <h2 id="mainMessage">BOOK YOUR SLOT</h2>
        <p id="subMessage">Verified players only • leaderboard every battle</p>
      </div>
    </section>

    <section class="bottom-left hud-card rewards-card">
      <div class="eyebrow">REWARDS</div>
      <div class="reward-total" id="rewardTotal">₹600</div>
      <div class="reward-lines">
        <span id="winnerReward">Winner ₹350</span>
        <span id="runnerReward">Runner ₹150</span>
        <span id="fragReward">Top Fraggers Rewards</span>
      </div>
    </section>

    <section class="bottom-right cta-card">
      <div class="cta-text" id="ctaText">REGISTER NOW — IT'S FREE</div>
      <div class="site" id="siteUrl">veerzone.com</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
