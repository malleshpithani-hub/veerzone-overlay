<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Veerzone Split Blade Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=7" />
</head>
<body>
  <main class="overlay-stage" aria-label="Veerzone Split Blade lower-third overlay">
    <section class="blade-wrap">
      <div class="logo-block" aria-hidden="true">
        <div class="logo-core">
          <span class="logo-gem"></span>
          <span class="logo-v">V</span>
          <span class="logo-scan"></span>
        </div>
      </div>

      <div class="main-blade">
        <div class="glow-line glow-top"></div>
        <div class="glow-line glow-bottom"></div>

        <div class="blade-left">
          <span class="brand-mini">VEERZONE</span>
          <div class="status-row">
            <span class="pulse-dot"></span>
            <span class="mode-text" id="modeText">MATCH LIVE</span>
          </div>
        </div>

        <div class="blade-divider"></div>

        <div class="blade-right">
          <span class="site-mini">OFFICIAL PLATFORM</span>
          <span class="site-text" id="siteText">VEERZONE.COM</span>
        </div>

        <div class="edge-bars" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js?v=7"></script>
</body>
</html>
