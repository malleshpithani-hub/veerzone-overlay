<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate" />
  <title>Veerzone Pro Stream Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --ink:#02050c;--panel:#060b16;--panel2:#0a1423;--white:#f7fbff;--muted:#8090aa;
      --violet:#a855f7;--purple:#7038ff;--cyan:#22d3ee;--ice:#94f5ff;--live:#ff315e;--safe-bottom:18px;
    }
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:transparent!important}
    body{font-family:"Rajdhani","Segoe UI",sans-serif;color:var(--white);pointer-events:none;-webkit-font-smoothing:antialiased}
    .stage{position:fixed;inset:0;overflow:hidden;background:transparent;isolation:isolate}
    .overlay{position:absolute;left:0;right:0;bottom:0;height:176px;padding:0;display:flex;align-items:flex-end}
    .ambient{position:absolute;left:4%;right:4%;bottom:-75px;height:205px;z-index:-2;opacity:.52;filter:blur(28px);background:radial-gradient(ellipse at 22% 100%,rgba(112,56,255,.3),transparent 44%),radial-gradient(ellipse at 78% 100%,rgba(34,211,238,.25),transparent 44%)}
    .rig{position:relative;width:100%;height:120px;display:grid;grid-template-columns:minmax(0,1fr) clamp(390px,29vw,540px) minmax(0,1fr);align-items:end;filter:drop-shadow(0 -14px 28px rgba(0,0,0,.36))}
    .rig::before{content:"";position:absolute;left:0;right:0;bottom:0;height:126px;z-index:-2;background:linear-gradient(180deg,rgba(10,19,34,.98),rgba(2,6,14,.995));border-top:1px solid rgba(255,255,255,.07);box-shadow:inset 0 1px 0 rgba(255,255,255,.025)}
    .rig::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;z-index:12;background:linear-gradient(90deg,var(--violet),rgba(112,56,255,.18) 35%,rgba(34,211,238,.18) 65%,var(--cyan));background-size:200% 100%;box-shadow:0 0 10px rgba(112,56,255,.3);animation:energyFlow 6s linear infinite}

    .wing{position:relative;z-index:1;height:104px;min-width:0;overflow:hidden;transform:translateY(calc(0px - var(--safe-bottom)));background:linear-gradient(180deg,rgba(12,22,39,.97),rgba(3,8,17,.985));border-top:1px solid rgba(255,255,255,.09);border-bottom:1px solid rgba(255,255,255,.06)}
    .wing::before{content:"";position:absolute;top:0;height:2px;width:72%;background-size:200% 100%;animation:energyFlow 4.8s linear infinite}
    .wing::after{content:"";position:absolute;inset:7px 0 0;opacity:.12;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:34px 34px;mask-image:linear-gradient(90deg,#000,transparent 82%)}
    .left-wing{padding:14px 50px 12px 23px;border-left:1px solid rgba(168,85,247,.6);clip-path:polygon(0 14px,14px 0,calc(100% - 34px) 0,100% 34px,100% 100%,0 100%)}
    .left-wing::before{left:0;background-image:linear-gradient(90deg,var(--violet),var(--ice),var(--violet))}
    .right-wing{padding:13px 23px 11px 50px;border-right:1px solid rgba(34,211,238,.65);clip-path:polygon(34px 0,calc(100% - 14px) 0,100% 14px,100% 100%,0 100%,0 34px)}
    .right-wing::before{right:0;background-image:linear-gradient(90deg,var(--cyan),var(--violet),var(--cyan))}
    .right-wing::after{transform:scaleX(-1)}
    .cutline{position:absolute;top:13px;bottom:10px;width:1px;z-index:3;background:linear-gradient(180deg,transparent,rgba(255,255,255,.2),transparent)}
    .left-wing .cutline{right:24px;transform:skewX(-19deg)}.right-wing .cutline{left:24px;transform:skewX(19deg)}
    .scan{position:absolute;top:0;bottom:0;left:-22%;width:10%;z-index:5;opacity:0;transform:skewX(-24deg);background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);filter:blur(2px);animation:scan 7s ease-in-out infinite}

    .socials{position:relative;z-index:2;height:100%;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));align-items:center;gap:clamp(10px,1.1vw,20px)}
    .social{min-width:0;display:grid;grid-template-columns:38px minmax(0,1fr);align-items:center;gap:10px}
    .social-icon{position:relative;width:38px;height:38px;display:grid;place-items:center;color:var(--tone);background:linear-gradient(145deg,color-mix(in srgb,var(--tone) 15%,transparent),rgba(255,255,255,.02));border:1px solid color-mix(in srgb,var(--tone) 48%,transparent);clip-path:polygon(24% 0,100% 0,100% 76%,76% 100%,0 100%,0 24%);filter:drop-shadow(0 0 7px color-mix(in srgb,var(--tone) 22%,transparent));animation:iconCharge 4.5s ease-in-out infinite}
    .social:nth-child(2) .social-icon{animation-delay:-1.5s}.social:nth-child(3) .social-icon{animation-delay:-3s}
    .social-icon svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
    .instagram{--tone:#c67aff}.youtube{--tone:#ff4f73}.whatsapp{--tone:#45e979}
    .social-copy{min-width:0}.social-label{margin-bottom:6px;color:#9aaac1;font-family:"Oxanium",sans-serif;font-size:10px;font-weight:700;line-height:1;letter-spacing:.13em;text-transform:uppercase}.social-value{overflow:hidden;color:#f3f7ff;font-size:14px;font-weight:700;line-height:1;letter-spacing:.02em;text-overflow:ellipsis;white-space:nowrap}

    .core{position:relative;height:146px;z-index:8;margin-right:-26px;margin-left:-26px;display:flex;align-items:flex-end;justify-content:center;transform:translateY(calc(0px - var(--safe-bottom)))}
    .core-shell{position:absolute;inset:0;background:radial-gradient(circle at 50% 0,rgba(112,56,255,.2),transparent 38%),linear-gradient(180deg,rgba(12,22,40,.995),rgba(2,6,14,.998));clip-path:polygon(0 36px,28px 8px,calc(50% - 58px) 8px,calc(50% - 48px) 0,calc(50% + 48px) 0,calc(50% + 58px) 8px,calc(100% - 28px) 8px,100% 36px,100% 100%,0 100%);border-left:1px solid rgba(168,85,247,.55);border-right:1px solid rgba(34,211,238,.55);box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
    .core-shell::before{content:"";position:absolute;left:9%;right:9%;bottom:7px;height:2px;background:linear-gradient(90deg,transparent,var(--violet),var(--cyan),transparent);background-size:200% 100%;box-shadow:0 0 10px rgba(34,211,238,.3);animation:energyFlow 4.5s linear infinite}
    .core-shell::after{content:"";position:absolute;inset:0;opacity:.08;background:linear-gradient(115deg,transparent 42%,rgba(255,255,255,.16) 42.3%,transparent 42.7%)}
    .core-content{position:relative;z-index:3;width:100%;height:100%;padding:13px 30px 13px;display:flex;align-items:center;justify-content:center;gap:17px}
    .emblem{position:relative;width:90px;height:90px;flex:0 0 auto;display:grid;place-items:center}
    .emblem-aura{position:absolute;inset:-8px;border-radius:50%;background:conic-gradient(from 0deg,transparent 0 18%,rgba(168,85,247,.75) 28%,transparent 40% 60%,rgba(34,211,238,.72) 72%,transparent 84%);filter:blur(5px);opacity:.64;animation:orbit 8s linear infinite}
    .emblem-ring{position:absolute;inset:2px;border:1px solid rgba(138,126,255,.28);clip-path:polygon(50% 0,94% 25%,94% 75%,50% 100%,6% 75%,6% 25%);animation:ringPulse 4s ease-in-out infinite}
    .emblem svg{position:relative;z-index:2;width:76px;height:76px;display:block;filter:drop-shadow(0 0 9px rgba(168,85,247,.45)) drop-shadow(0 0 8px rgba(34,211,238,.28));animation:logoFloat 4s ease-in-out infinite}
    .brand{min-width:0;padding-top:3px}
    .brand-name{position:relative;width:max-content;font-family:"Oxanium",sans-serif;font-size:clamp(27px,2.05vw,39px);font-weight:800;font-style:italic;line-height:.9;letter-spacing:.035em;transform:skewX(-3deg);background:linear-gradient(105deg,#fff 0%,#dce7f4 25%,#c773ff 48%,#627fff 70%,#6bedff 100%);background-size:180% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-stroke:.3px rgba(235,247,255,.35);filter:drop-shadow(0 0 9px rgba(112,56,255,.2));white-space:nowrap;animation:wordShine 6s ease-in-out infinite}
    .brand-name::after{content:"";position:absolute;left:1%;right:0;bottom:-7px;height:3px;background:linear-gradient(90deg,var(--violet),var(--cyan),transparent);clip-path:polygon(0 0,100% 0,92% 100%,3% 100%);box-shadow:0 0 8px rgba(34,211,238,.28)}
    .tagline{margin-top:13px;color:#8ea0bb;font-family:"Oxanium",sans-serif;font-size:8px;font-weight:700;letter-spacing:.2em;white-space:nowrap}.site{margin-top:7px;color:#d7e2f0;font-family:"Oxanium",sans-serif;font-size:8px;font-weight:600;letter-spacing:.17em;white-space:nowrap}

    .live-card{position:relative;z-index:2;width:min(88%,470px);height:100%;margin:0 auto;display:flex;flex-direction:column;justify-content:center;min-width:0;padding:0 12px;animation:liveBreathe 4.4s ease-in-out infinite}
    .live-top{display:flex;align-items:center;gap:14px;min-width:0}.status{flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;padding:7px 10px;color:#ff708b;background:rgba(255,49,94,.1);border:1px solid rgba(255,49,94,.3);clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);font-family:"Oxanium",sans-serif;font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}.dot{width:8px;height:8px;border-radius:50%;background:var(--live);box-shadow:0 0 11px rgba(255,49,94,.9);animation:livePulse 1.5s ease-in-out infinite}.title{min-width:0;overflow:hidden;font-family:"Oxanium",sans-serif;font-size:clamp(23px,1.7vw,32px);font-weight:800;font-style:italic;line-height:1;letter-spacing:.02em;text-overflow:ellipsis;white-space:nowrap;background:linear-gradient(100deg,#fff,#d9e8f8 42%,var(--ice));-webkit-background-clip:text;background-clip:text;color:transparent}.subtitle{margin-top:11px;overflow:hidden;color:var(--cyan);font-family:"Oxanium",sans-serif;font-size:13px;font-weight:700;letter-spacing:.11em;text-overflow:ellipsis;text-transform:uppercase;white-space:nowrap}.description{margin-top:8px;overflow:hidden;color:#bdc8d8;font-size:13px;font-weight:600;letter-spacing:.03em;text-overflow:ellipsis;white-space:nowrap}.meter{display:flex;gap:4px;margin-top:10px;width:132px}.meter i{display:block;height:2px;flex:1;background:#28354a;transform:skewX(-24deg);animation:meter 2.4s ease-in-out infinite}.meter i:nth-child(2){animation-delay:.15s}.meter i:nth-child(3){animation-delay:.3s}.meter i:nth-child(4){animation-delay:.45s}.meter i:nth-child(5){animation-delay:.6s}

    @keyframes energyFlow{from{background-position:200% 50%}to{background-position:0 50%}}
    @keyframes scan{0%,18%{left:-22%;opacity:0}28%{opacity:.65}52%{left:108%;opacity:0}100%{left:108%;opacity:0}}
    @keyframes orbit{to{transform:rotate(360deg)}}
    @keyframes logoFloat{0%,100%{transform:translateY(2px) scale(.985);filter:brightness(.98)}50%{transform:translateY(-4px) scale(1.035);filter:brightness(1.16)}}
    @keyframes ringPulse{0%,100%{transform:scale(.94);opacity:.45}50%{transform:scale(1.04);opacity:.9}}
    @keyframes iconCharge{0%,100%{transform:translateY(1px);filter:drop-shadow(0 0 5px color-mix(in srgb,var(--tone) 16%,transparent))}50%{transform:translateY(-3px);filter:drop-shadow(0 0 10px color-mix(in srgb,var(--tone) 34%,transparent))}}
    @keyframes wordShine{0%,100%{background-position:100% 50%}50%{background-position:0 50%}}
    @keyframes livePulse{0%,100%{transform:scale(.78);opacity:.6}50%{transform:scale(1.18);opacity:1}}
    @keyframes liveBreathe{0%,100%{filter:brightness(.98)}50%{filter:brightness(1.08)}}
    @keyframes meter{0%,100%{background:#28354a;box-shadow:none}50%{background:var(--cyan);box-shadow:0 0 7px rgba(34,211,238,.6)}}

    @media(max-width:1180px),(max-height:760px){:root{--safe-bottom:20px}.overlay{height:152px}.rig{height:112px;grid-template-columns:minmax(0,1fr) 340px minmax(0,1fr)}.rig::before{height:110px}.wing{height:90px}.left-wing{padding:11px 38px 9px 20px}.right-wing{padding:10px 20px 9px 38px}.social{grid-template-columns:34px minmax(0,1fr);gap:9px}.social-icon{width:34px;height:34px}.social-icon svg{width:17px;height:17px}.social-label{font-size:8px}.social-value{font-size:11px}.core{height:126px;margin-right:-24px;margin-left:-24px}.core-content{padding:10px 20px;gap:12px}.emblem{width:72px;height:72px}.emblem svg{width:62px;height:62px}.brand-name{font-size:28px}.tagline,.site{font-size:7px}.tagline{margin-top:11px}.live-card{width:min(92%,430px);padding:0 16px}.title{font-size:24px}.subtitle,.description{font-size:10px}.status{font-size:7px;padding:6px 8px}.meter{margin-top:8px;width:124px}}
    @media(max-width:860px){.rig{grid-template-columns:minmax(0,1fr) 240px minmax(0,1fr)}.social-copy{display:none}.social{display:flex;justify-content:center}.emblem{width:58px;height:58px}.emblem svg{width:51px;height:51px}.brand-name{font-size:20px}.tagline{font-size:5px}.site{display:none}.live-top{gap:7px}.description{display:none}}

    /* StreamChamp performance profile: one GPU-friendly logo loop, everything else static. */
    .rig::after,.wing::before,.core-shell::before,.social-icon,.emblem-aura,.emblem-ring,.brand-name,.live-card,.dot,.meter i{animation:none!important}
    .scan{display:none;animation:none!important}
    .emblem svg{animation:logoProLoop 4.8s cubic-bezier(.45,0,.55,1) infinite!important;will-change:transform,filter;transform:translateZ(0);backface-visibility:hidden}
    .emblem-aura{transform:rotate(24deg);opacity:.72;filter:blur(7px)}
    .emblem-ring{transform:scale(1.02);opacity:.78}
    .dot{opacity:1}
    .meter i:nth-child(1),.meter i:nth-child(4){background:var(--violet);box-shadow:0 0 7px rgba(168,85,247,.42)}
    .meter i:nth-child(2),.meter i:nth-child(5){background:var(--cyan);box-shadow:0 0 7px rgba(34,211,238,.42)}
    .meter i:nth-child(3){background:#5b78ff;box-shadow:0 0 7px rgba(91,120,255,.42)}

    .overlay{height:210px}
    .rig{height:158px;grid-template-columns:minmax(0,1fr) clamp(440px,30vw,560px) minmax(0,1fr)}
    .rig::before{height:150px;background:linear-gradient(180deg,rgba(11,22,40,.99),rgba(2,6,14,.998));border-top-color:rgba(255,255,255,.11)}
    .wing{height:132px;box-shadow:inset 0 1px 0 rgba(255,255,255,.035),inset 0 -18px 35px rgba(0,0,0,.16)}
    .left-wing{padding:19px 58px 17px 34px}.right-wing{padding:18px 34px 16px 58px}
    .socials{gap:clamp(16px,1.35vw,26px)}.social{grid-template-columns:44px minmax(0,1fr);gap:13px}.social-icon{width:44px;height:44px}.social-icon svg{width:21px;height:21px}.social-label{font-size:10px}.social-value{font-size:15px}
    .core{height:178px;margin-right:-30px;margin-left:-30px}.core-content{padding:18px 36px;gap:21px}.emblem{width:104px;height:104px}.emblem svg{width:88px;height:88px}.brand-name{font-size:42px}.tagline{font-size:9px}.site{font-size:9px}
    .live-card{width:min(88%,500px);padding:0 18px}.live-top{gap:16px}.status{font-size:10px;padding:8px 11px}.title{font-size:34px}.subtitle{font-size:14px;margin-top:12px}.description{font-size:14px;margin-top:9px}.meter{width:148px;margin-top:12px}.meter i{height:3px}
    .wing::after{opacity:.16}.core-shell{background:radial-gradient(circle at 50% 2%,rgba(112,56,255,.25),transparent 38%),linear-gradient(180deg,rgba(13,25,45,.998),rgba(2,7,16,.999));border-left-color:rgba(168,85,247,.72);border-right-color:rgba(34,211,238,.72)}

    @keyframes logoProLoop{0%,100%{transform:translate3d(0,2px,0) scale(.985);filter:brightness(1) drop-shadow(0 0 8px rgba(168,85,247,.36)) drop-shadow(0 0 7px rgba(34,211,238,.24))}50%{transform:translate3d(0,-5px,0) scale(1.045);filter:brightness(1.18) drop-shadow(0 0 15px rgba(168,85,247,.52)) drop-shadow(0 0 12px rgba(34,211,238,.38))}}

    @media(max-width:1180px),(max-height:760px){.overlay{height:184px}.rig{height:142px;grid-template-columns:minmax(0,1fr) 360px minmax(0,1fr)}.rig::before{height:136px}.wing{height:116px}.left-wing{padding:15px 40px 13px 22px}.right-wing{padding:14px 22px 13px 40px}.socials{gap:8px}.social{grid-template-columns:36px minmax(0,1fr);gap:8px}.social-icon{width:36px;height:36px}.social-icon svg{width:18px;height:18px}.social-label{font-size:8px}.social-value{font-size:12px}.core{height:154px;margin-right:-26px;margin-left:-26px}.core-content{padding:14px 20px;gap:13px}.emblem{width:82px;height:82px}.emblem svg{width:72px;height:72px}.brand-name{font-size:33px}.tagline,.site{font-size:8px}.live-card{width:min(92%,460px);padding:0 18px}.status{font-size:8px;padding:7px 9px}.title{font-size:28px}.subtitle,.description{font-size:12px}.meter{width:138px;margin-top:10px}}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important}}
  </style>
</head>
<body>
<main class="stage" aria-label="Veerzone professional stream overlay">
  <section class="overlay">
    <div class="ambient"></div>
    <div class="rig">
      <section class="wing left-wing">
        <div class="cutline"></div><div class="scan"></div>
        <div class="socials">
          <div class="social instagram"><div class="social-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.4" cy="6.7" r="1" fill="currentColor" stroke="none"/></svg></div><div class="social-copy"><div class="social-label">Instagram</div><div class="social-value">@veerzone_battles</div></div></div>
          <div class="social youtube"><div class="social-icon"><svg viewBox="0 0 24 24"><rect x="2.5" y="5.5" width="19" height="13" rx="4"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/></svg></div><div class="social-copy"><div class="social-label">YouTube</div><div class="social-value">@veerzone_official</div></div></div>
          <div class="social whatsapp"><div class="social-icon"><svg viewBox="0 0 24 24"><path d="M20.4 11.7a8.4 8.4 0 0 1-12.5 7.4L3 20.4l1.4-4.6A8.4 8.4 0 1 1 20.4 11.7z"/><path d="M8.6 7.9c.3-.6.7-.6 1-.6h.4c.2 0 .5.1.6.5l.8 2c.1.3.1.6-.1.8l-.8 1c-.2.2-.1.5.1.8.5.9 1.3 1.7 2.3 2.2.3.2.6.2.8 0l1-.9c.2-.2.5-.2.8-.1l2 .9c.3.2.5.4.5.7 0 .4-.2 1.4-.8 2-.6.7-1.5 1-2.5.8-1.3-.2-2.9-.8-4.8-2.5-1.5-1.4-2.7-3-3.1-4.3-.5-1.5.1-2.6.8-3.3z"/></svg></div><div class="social-copy"><div class="social-label">WhatsApp</div><div class="social-value">9014122762</div></div></div>
        </div>
      </section>

      <section class="core">
        <div class="core-shell"></div>
        <div class="core-content">
          <div class="emblem" aria-hidden="true"><div class="emblem-aura"></div><div class="emblem-ring"></div><svg viewBox="0 0 320 320" fill="none"><defs><linearGradient id="outer" x1="48" y1="35" x2="278" y2="284" gradientUnits="userSpaceOnUse"><stop stop-color="#b44cff"/><stop offset=".48" stop-color="#6d5cff"/><stop offset="1" stop-color="#22d3ee"/></linearGradient><linearGradient id="fill" x1="74" y1="68" x2="245" y2="258" gradientUnits="userSpaceOnUse"><stop stop-color="#f050ff"/><stop offset=".45" stop-color="#7c3aed"/><stop offset="1" stop-color="#22d3ee"/></linearGradient></defs><path d="M160 19L281 88V226L160 301L39 226V88L160 19Z" fill="#070b18" stroke="url(#outer)" stroke-width="10"/><path d="M82 99H118L160 188L202 99H238L160 267L82 99Z" fill="url(#fill)" stroke="#9bdfff" stroke-opacity=".18" stroke-width="3"/><path d="M160 55L177 83L160 112L143 83L160 55Z" fill="#22d3ee" stroke="#b9f5ff" stroke-width="3"/></svg></div>
          <div class="brand"><div class="brand-name">VEERZONE</div><div class="tagline">BGMI COMPETITIVE ARENA</div><div class="site" id="siteText">VEERZONE.COM</div></div>
        </div>
      </section>

      <section class="wing right-wing">
        <div class="cutline"></div><div class="scan" style="animation-delay:-3.5s"></div>
        <div class="live-card"><div class="live-top"><div class="status"><span class="dot"></span><span id="statusText">LIVE</span></div><div class="title" id="titleText">LIVE MATCHES</div></div><div class="subtitle" id="subtitleText">CLASSICS &amp; TDMs</div><div class="description" id="descriptionText">Daily TDMs • Weekly Classics</div><div class="meter"><i></i><i></i><i></i><i></i><i></i></div></div>
      </section>
    </div>
  </section>
</main>
<script>
(()=>{const p=new URLSearchParams(location.search);const f={title:["titleText","LIVE MATCHES"],subtitle:["subtitleText","CLASSICS & TDMs"],description:["descriptionText","Daily TDMs • Weekly Classics"],status:["statusText","LIVE"],site:["siteText","VEERZONE.COM"]};Object.entries(f).forEach(([k,[id,d]])=>{const e=document.getElementById(id),v=p.get(k)?.trim();if(e)e.textContent=v||d})})();
</script>
</body>
</html>
