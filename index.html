<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Veerzone Premium Stream Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Oxanium:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --violet:#a855f7;--violet2:#6d39f2;--cyan:#20dcff;--blue:#2876ff;
  --white:#f8fbff;--muted:#aebbd0;--deep:#030611;--panel:#07101f;
}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:transparent!important}
body{font-family:"Inter",Arial,sans-serif;color:var(--white);pointer-events:none}
.stage{position:fixed;inset:0;overflow:hidden;background:transparent;isolation:isolate}
.overlay{position:absolute;left:0;right:0;bottom:0;height:188px;z-index:4}
.ambient{position:absolute;left:0;right:0;bottom:-30px;height:170px;background:radial-gradient(ellipse at 18% 100%,rgba(124,58,237,.24),transparent 48%),radial-gradient(ellipse at 82% 100%,rgba(32,220,255,.18),transparent 48%);filter:blur(18px);opacity:.8}
.shell{position:absolute;left:0;right:0;bottom:0;height:116px;background:linear-gradient(90deg,rgba(168,85,247,.07),transparent 25%,transparent 75%,rgba(32,220,255,.07)),linear-gradient(180deg,rgba(10,17,33,.99),rgba(3,7,16,.995));border-top:1px solid rgba(255,255,255,.08);box-shadow:0 -16px 42px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.025)}
.shell:before{content:"";position:absolute;left:0;right:0;top:-2px;height:2px;background:linear-gradient(90deg,var(--violet),rgba(168,85,247,.38) 38%,rgba(32,220,255,.42) 62%,var(--cyan));box-shadow:0 0 10px rgba(168,85,247,.42),0 0 13px rgba(32,220,255,.32)}
.shell:after{content:"";position:absolute;inset:12px 0 0;opacity:.08;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:40px 40px;mask-image:linear-gradient(90deg,#000,transparent 35%,transparent 65%,#000)}
.rail{position:absolute;left:0;right:0;bottom:0;height:116px;display:grid;grid-template-columns:minmax(0,1fr) minmax(560px,690px) minmax(0,1fr);align-items:stretch;z-index:5}
.zone{position:relative;min-width:0;display:flex;align-items:center}
.left-zone{justify-content:flex-start;padding:14px 50px 14px 34px}
.right-zone{justify-content:flex-end;padding:14px 34px 14px 50px}
.left-zone:after,.right-zone:before{content:"";position:absolute;top:18px;bottom:16px;width:1px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.16),transparent)}
.left-zone:after{right:20px}.right-zone:before{left:20px}
.socials{display:flex;align-items:center;gap:14px;min-width:0}
.social{display:grid;grid-template-columns:38px auto;grid-template-rows:auto auto;column-gap:11px;align-items:center;min-width:0;padding:11px 14px 10px;border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.018));border:1px solid rgba(255,255,255,.085);box-shadow:inset 0 1px 0 rgba(255,255,255,.035),0 8px 24px rgba(0,0,0,.16);animation:cardGlow 6s ease-in-out infinite}
.social:nth-child(2){animation-delay:.35s}.social:nth-child(3){animation-delay:.7s}
.icon-wrap{grid-row:1/3;width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:rgba(255,255,255,.035);border:1px solid currentColor;box-shadow:0 0 13px color-mix(in srgb,currentColor 34%,transparent)}
.social svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.instagram{color:#bd63ff}.youtube{color:#ff3b77}.whatsapp{color:#45e46b}
.social-label{font-size:10px;font-weight:600;line-height:1;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.social-value{margin-top:5px;font-family:"Oxanium",sans-serif;font-size:12px;font-weight:700;line-height:1;color:#fff;white-space:nowrap}
.center-zone{position:relative;display:flex;align-items:flex-end;justify-content:center;z-index:8}
.crown{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:100%;height:188px;filter:drop-shadow(0 -8px 22px rgba(0,0,0,.34))}
.crown-bg{position:absolute;left:0;right:0;bottom:0;height:132px;background:linear-gradient(180deg,rgba(10,17,33,.995),rgba(3,7,16,.999));clip-path:polygon(0 24%,8% 24%,13% 0,37% 0,41% 18%,59% 18%,63% 0,87% 0,92% 24%,100% 24%,100% 100%,0 100%);border-left:1px solid rgba(168,85,247,.45);border-right:1px solid rgba(32,220,255,.45)}
.crown-bg:before{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:linear-gradient(90deg,var(--violet),rgba(168,85,247,.45),rgba(32,220,255,.45),var(--cyan));box-shadow:0 0 11px rgba(168,85,247,.44),0 0 11px rgba(32,220,255,.34)}
.crown-bg:after{content:"";position:absolute;left:10%;right:10%;bottom:8px;height:2px;background:linear-gradient(90deg,transparent,var(--violet),var(--cyan),transparent);opacity:.7;filter:blur(.2px)}
.logo-dock{position:absolute;left:50%;top:4px;transform:translateX(-50%);width:104px;height:104px;z-index:12;display:grid;place-items:center;animation:logoBreath 4.8s ease-in-out infinite}
.logo-dock:after{content:"";position:absolute;left:50%;bottom:-11px;transform:translateX(-50%);width:80px;height:18px;background:linear-gradient(90deg,var(--violet),var(--cyan));filter:blur(12px);opacity:.28}
.logo-dock svg{width:100%;height:100%;display:block;filter:drop-shadow(0 0 13px rgba(168,85,247,.42)) drop-shadow(0 0 10px rgba(32,220,255,.3))}
.brand-copy{position:absolute;left:0;right:0;bottom:18px;z-index:13;display:flex;flex-direction:column;align-items:center;text-align:center}
.brand-name{font-family:"Oxanium",sans-serif;font-size:32px;font-weight:800;line-height:.95;letter-spacing:.015em;font-style:italic;background:linear-gradient(105deg,#ffffff 0%,#cdd8e9 24%,#9b5cff 48%,#2e79ff 72%,#20dcff 100%);-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap;text-shadow:0 0 18px rgba(32,220,255,.08)}
.register-line{margin-top:8px;display:flex;align-items:center;gap:11px;font-family:"Oxanium",sans-serif;font-size:10px;font-weight:700;letter-spacing:.16em;color:#cbd6e8;white-space:nowrap;text-transform:uppercase}
.register-line:before,.register-line:after{content:"";width:36px;height:2px;background:linear-gradient(90deg,transparent,var(--violet));box-shadow:0 0 7px rgba(168,85,247,.35)}
.register-line:after{background:linear-gradient(90deg,var(--cyan),transparent);box-shadow:0 0 7px rgba(32,220,255,.35)}
.live-card{position:relative;min-width:340px;max-width:470px;padding:14px 18px 13px;border-radius:15px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.016));border:1px solid rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.035),0 10px 28px rgba(0,0,0,.18)}
.live-row{display:flex;align-items:center;gap:11px;white-space:nowrap}
.live-pill{display:inline-flex;align-items:center;gap:7px;padding:5px 9px;border-radius:999px;background:rgba(255,45,85,.12);border:1px solid rgba(255,72,105,.25);color:#ff6382;font-family:"Oxanium",sans-serif;font-size:9px;font-weight:800;letter-spacing:.09em}
.live-dot{width:7px;height:7px;border-radius:50%;background:#ff385f;box-shadow:0 0 10px rgba(255,56,95,.85);animation:pulse 1.55s ease-in-out infinite}
.live-title{font-family:"Oxanium",sans-serif;font-size:24px;font-weight:800;line-height:1;font-style:italic;letter-spacing:.01em;background:linear-gradient(100deg,#ffffff 0%,#dbe6f4 30%,#2e79ff 65%,#20dcff 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.live-sub{margin-top:8px;display:flex;align-items:center;gap:9px;font-family:"Oxanium",sans-serif;font-size:11px;font-weight:700;color:#2bdfff;letter-spacing:.08em;white-space:nowrap}
.live-sub:before,.live-sub:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,transparent,rgba(32,220,255,.7))}.live-sub:after{background:linear-gradient(90deg,rgba(32,220,255,.7),transparent)}
.live-desc{margin-top:7px;font-size:10px;font-weight:500;color:#c4cfdf;white-space:nowrap}
.sweep{position:absolute;left:-15%;bottom:0;width:12%;height:116px;z-index:9;transform:skewX(-22deg);background:linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent);filter:blur(2px);animation:sweep 7s ease-in-out infinite}
.corner-left,.corner-right{position:absolute;bottom:8px;width:120px;height:4px;z-index:10;opacity:.8}.corner-left{left:0;background:linear-gradient(90deg,var(--violet),transparent)}.corner-right{right:0;background:linear-gradient(90deg,transparent,var(--cyan))}
@keyframes pulse{0%,100%{transform:scale(.82);opacity:.65}50%{transform:scale(1.15);opacity:1}}
@keyframes logoBreath{0%,100%{transform:translateX(-50%) translateY(0) scale(1);filter:brightness(1)}50%{transform:translateX(-50%) translateY(-2px) scale(1.012);filter:brightness(1.08)}}
@keyframes cardGlow{0%,100%{border-color:rgba(255,255,255,.075)}50%{border-color:rgba(255,255,255,.13)}}
@keyframes sweep{0%,18%{left:-15%;opacity:0}28%{opacity:.65}52%{left:108%;opacity:0}100%{left:108%;opacity:0}}
@media(max-width:1250px){
  .rail{grid-template-columns:minmax(0,1fr) minmax(430px,520px) minmax(0,1fr)}
  .left-zone{padding-left:16px;padding-right:24px}.right-zone{padding-right:16px;padding-left:24px}
  .socials{gap:8px}.social{grid-template-columns:30px auto;padding:9px 9px}.icon-wrap{width:30px;height:30px}.social svg{width:17px;height:17px}.social-value{font-size:10px}
  .live-card{min-width:280px}.live-title{font-size:20px}
  .brand-name{font-size:27px}
}
</style>
</head>
<body>
<main class="stage" aria-label="Veerzone premium StreamChamp overlay">
  <section class="overlay">
    <div class="ambient"></div>
    <div class="shell"></div>
    <div class="sweep"></div>
    <div class="corner-left"></div><div class="corner-right"></div>
    <div class="rail">
      <div class="zone left-zone">
        <div class="socials">
          <div class="social instagram">
            <div class="icon-wrap"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.3" cy="6.7" r="1" fill="currentColor" stroke="none"/></svg></div>
            <div class="social-label">Instagram</div><div class="social-value">@veerzone_battles</div>
          </div>
          <div class="social youtube">
            <div class="icon-wrap"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="2.5" y="5.5" width="19" height="13" rx="4"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/></svg></div>
            <div class="social-label">YouTube</div><div class="social-value">@veerzone_official</div>
          </div>
          <div class="social whatsapp">
            <div class="icon-wrap"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.4 11.7a8.4 8.4 0 0 1-12.5 7.4L3 20.4l1.4-4.6A8.4 8.4 0 1 1 20.4 11.7z"/><path d="M8.5 7.9c.4-.6.8-.6 1.1-.6h.3c.3 0 .5.1.7.5l.8 2c.1.3.1.6-.1.8l-.8 1c-.2.2-.1.5.1.8.5.9 1.3 1.7 2.3 2.2.3.2.6.2.8 0l1-.9c.2-.2.5-.2.8-.1l2 .9c.3.2.5.4.5.7 0 .4-.2 1.4-.8 2-.6.7-1.5 1-2.5.8-1.3-.2-2.9-.8-4.8-2.5-1.5-1.4-2.7-3-3.1-4.3-.5-1.5.1-2.6.7-3.3z"/></svg></div>
            <div class="social-label">WhatsApp</div><div class="social-value">9014122762</div>
          </div>
        </div>
      </div>
      <div class="center-zone">
        <div class="crown"><div class="crown-bg"></div></div>
        <div class="logo-dock" aria-hidden="true">
          <svg viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="vzOuter" x1="48" y1="35" x2="278" y2="284" gradientUnits="userSpaceOnUse"><stop stop-color="#b44cff"/><stop offset=".48" stop-color="#6d5cff"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
              <linearGradient id="vzFill" x1="74" y1="68" x2="245" y2="258" gradientUnits="userSpaceOnUse"><stop stop-color="#f050ff"/><stop offset=".45" stop-color="#7c3aed"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
            </defs>
            <path d="M160 19L281 88V226L160 301L39 226V88L160 19Z" fill="#070b18" stroke="url(#vzOuter)" stroke-width="10"/>
            <path d="M82 99H118L160 188L202 99H238L160 267L82 99Z" fill="url(#vzFill)" stroke="#9bdfff" stroke-opacity=".18" stroke-width="3"/>
            <path d="M160 55L177 83L160 112L143 83L160 55Z" fill="#22d3ee" stroke="#b9f5ff" stroke-width="3"/>
          </svg>
        </div>
        <div class="brand-copy"><div class="brand-name">VEERZONE</div><div class="register-line">REGISTER IN VEERZONE.COM</div></div>
      </div>
      <div class="zone right-zone">
        <div class="live-card">
          <div class="live-row"><span class="live-pill"><span class="live-dot"></span>LIVE</span><span class="live-title">LIVE MATCHES</span></div>
          <div class="live-sub">CLASSIC'S AND TDM'S</div>
          <div class="live-desc">Daily TDM's and Weekly Classics</div>
        </div>
      </div>
    </div>
  </section>
</main>
</body>
</html>
