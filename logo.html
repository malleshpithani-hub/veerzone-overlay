<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Veerzone Animated Logo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="logo.css" />
</head>
<body>
  <main class="logo-stage" aria-label="Veerzone animated logo overlay">
    <section class="logo-anchor" id="logoAnchor">
      <div class="aura aura-one"></div>
      <div class="aura aura-two"></div>
      <div class="hex-ring ring-one"></div>
      <div class="hex-ring ring-two"></div>
      <div class="logo-core">
        <span class="logo-v">V</span>
        <span class="logo-gem"></span>
        <span class="logo-shine"></span>
      </div>
      <div class="brand-word" id="brandWord">VEERZONE</div>
    </section>
  </main>
  <script src="logo.js"></script>
</body>
</html>
